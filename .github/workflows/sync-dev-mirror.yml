name: Sync dev to mirror main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions: write-all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: false

      - name: Push dev to mirror main branch
        env:
          MIRROR_SYNC_TOKEN: ${{ secrets.MIRROR_SYNC_TOKEN }}
        run: |
          if [ -z "$MIRROR_SYNC_TOKEN" ]; then
            echo "::error::Add repository secret MIRROR_SYNC_TOKEN (PAT with push access to Bisratasaye12/etstockx-frontend)."
            exit 1
          fi

          # checkout@v4 can leave GITHUB_TOKEN on github.com; that overrides the PAT in the remote URL.
          git config --global --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          git config --global --unset-all credential.helper 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add mirror "https://x-access-token:${MIRROR_SYNC_TOKEN}@github.com/Bisratasaye12/etstockx-frontend.git"
          git -c credential.helper= push mirror "HEAD:main" --force
